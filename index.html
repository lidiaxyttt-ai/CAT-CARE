<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#fdf8f5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Cat Care</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#fdf8f5;
            --card:#ffffff;
            --pink-light:#fff0f3;
            --pink:#ffc2d1;
            --pink-mid:#ffb3c6;
            --pink-deep:#ff8fab;
            --pink-text:#d1477a;
            --warm-50:#fefcfa;
            --warm-100:#fdf6f0;
            --warm-200:#faeee5;
            --warm-300:#f5e1d0;
            --brown-light:#f5ebe0;
            --brown:#ddb892;
            --brown-deep:#a47148;
            --green-light:#e8f5e9;
            --green:#66bb6a;
            --blue-light:#e3f2fd;
            --blue:#42a5f5;
            --orange-light:#fff3e0;
            --orange:#ffa726;
            --red-light:#ffebee;
            --red:#ef5350;
            --purple-light:#f3e5f5;
            --purple:#ab47bc;
            --text-primary:#2d2017;
            --text-secondary:#7a6b5d;
            --text-muted:#b8a99a;
            --border:#f2ebe4;
            --shadow-card:0 2px 16px rgba(180,140,110,0.08);
            --shadow-card-hover:0 4px 24px rgba(180,140,110,0.14);
            --radius-xl:24px;
            --radius-lg:20px;
            --radius-md:16px;
            --radius-sm:12px;
            --radius-xs:8px;
            --bottom-h:64px;
            --safe-b:env(safe-area-inset-bottom,0px);
        }
        body{
            font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
            background:var(--bg);
            color:var(--text-primary);
            font-size:14px;line-height:1.6;
            min-height:100vh;min-height:100dvh;
            overflow-x:hidden;
        }
        .app{padding-bottom:calc(var(--bottom-h) + var(--safe-b) + 12px)}

        /* Tab Bar */
        .tab-bar{
            position:fixed;bottom:0;left:0;right:0;
            height:calc(var(--bottom-h) + var(--safe-b));
            padding-bottom:var(--safe-b);
            background:rgba(255,255,255,0.92);
            backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
            border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-around;
            z-index:200;
        }
        .tab-item{
            display:flex;flex-direction:column;align-items:center;gap:3px;
            padding:6px 0;border:none;background:none;cursor:pointer;
            color:var(--text-muted);font-size:10px;font-weight:500;
            font-family:inherit;min-width:56px;transition:all 0.2s;
        }
        .tab-item.active{color:var(--pink-text)}
        .tab-item svg{width:24px;height:24px;stroke-width:1.6;transition:transform 0.2s}
        .tab-item.active svg{transform:scale(1.08)}

        /* Main */
        .main{padding:20px 20px 8px;max-width:500px;margin:0 auto}
        .module{display:none;animation:fadeUp 0.3s ease}
        .module.active{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* Typography */
        .heading-xl{font-size:28px;font-weight:800;letter-spacing:-0.5px;color:var(--text-primary)}
        .heading-lg{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:var(--text-primary)}
        .heading-md{font-size:17px;font-weight:700;color:var(--text-primary)}
        .heading-sm{font-size:13px;font-weight:600;color:var(--text-secondary)}
        .text-body{font-size:14px;color:var(--text-secondary)}
        .text-sm{font-size:12px;color:var(--text-muted)}
        .text-xs{font-size:11px;color:var(--text-muted)}
        .text-jumbo{font-size:32px;font-weight:800;letter-spacing:-1px}

        /* Cards */
        .card{
            background:var(--card);
            border-radius:var(--radius-xl);
            padding:20px;
            margin-bottom:16px;
            box-shadow:var(--shadow-card);
            border:1px solid rgba(0,0,0,0.02);
        }
        .card-sm{padding:16px;border-radius:var(--radius-lg)}
        .card-flush{padding:0;overflow:hidden}

        /* Buttons */
        .btn{
            padding:10px 18px;border-radius:var(--radius-sm);border:none;
            cursor:pointer;font-size:13px;font-weight:600;
            font-family:inherit;transition:all 0.2s;
            display:inline-flex;align-items:center;gap:6px;
        }
        .btn-primary{background:var(--pink-deep);color:#fff;box-shadow:0 4px 12px rgba(255,143,175,0.3)}
        .btn-primary:active{transform:scale(0.96);box-shadow:0 2px 8px rgba(255,143,175,0.2)}
        .btn-soft{background:var(--pink-light);color:var(--pink-text)}
        .btn-soft:active{background:var(--pink)}
        .btn-ghost{background:none;color:var(--text-secondary);padding:8px 12px}
        .btn-sm{padding:8px 14px;font-size:12px;border-radius:var(--radius-xs)}
        .btn-round{width:52px;height:52px;border-radius:50%;padding:0;justify-content:center;font-size:22px;box-shadow:0 6px 20px rgba(255,143,175,0.35)}

        /* FAB */
        .fab{position:fixed;bottom:calc(var(--bottom-h) + var(--safe-b) + 20px);right:20px;z-index:150}

        /* Divider */
        .divider{border:none;border-top:1.5px dashed var(--border);margin:14px 0}

        /* Record items (card-list style) */
        .record-list{display:flex;flex-direction:column;gap:12px}
        .record-item{
            background:var(--card);
            border-radius:var(--radius-lg);
            padding:16px 18px;
            box-shadow:var(--shadow-card);
            border:1px solid rgba(0,0,0,0.02);
            position:relative;
        }
        .record-item .ri-top{display:flex;justify-content:space-between;align-items:flex-start}
        .record-item .ri-title{font-size:15px;font-weight:700;color:var(--text-primary)}
        .record-item .ri-right{text-align:right}
        .record-item .ri-value{font-size:18px;font-weight:800;color:var(--text-primary)}
        .record-item .ri-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
        .record-item .ri-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1.5px dashed var(--border)}
        .record-item .ri-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
        .record-item .ri-actions{display:flex;gap:4px}

        /* Tags */
        .tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .tag-pink{background:var(--pink-light);color:var(--pink-text)}
        .tag-green{background:var(--green-light);color:#2e7d32}
        .tag-blue{background:var(--blue-light);color:#1565c0}
        .tag-orange{background:var(--orange-light);color:#e65100}
        .tag-red{background:var(--red-light);color:#c62828}
        .tag-purple{background:var(--purple-light);color:#7b1fa2}
        .tag-warm{background:var(--brown-light);color:var(--brown-deep)}

        /* Profile Card */
        .id-card{
            background:var(--card);
            border-radius:var(--radius-xl);
            overflow:hidden;
            box-shadow:var(--shadow-card);
            border:1px solid rgba(0,0,0,0.02);
            margin-bottom:20px;
        }
        .id-card-header{
            background:linear-gradient(135deg,var(--pink-light),var(--warm-200));
            padding:16px 20px;
            display:flex;align-items:center;justify-content:space-between;
        }
        .id-card-header .label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--pink-text);text-transform:uppercase}
        .id-card-header .breed-info{font-size:12px;font-weight:600;color:var(--text-secondary)}
        .id-card-body{padding:24px 20px}
        .id-card-top{display:flex;align-items:center;gap:16px;margin-bottom:24px}
        .id-avatar{
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,var(--pink-light),var(--pink));
            display:flex;align-items:center;justify-content:center;
            font-size:36px;cursor:pointer;overflow:hidden;
            border:3px solid var(--card);
            box-shadow:0 4px 16px rgba(255,143,175,0.2);
            flex-shrink:0;
        }
        .id-avatar img{width:100%;height:100%;object-fit:cover}
        .id-card-name .name{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:var(--text-primary)}
        .id-card-name .sub{font-size:12px;color:var(--text-muted);margin-top:2px}
        .id-card-fields{display:flex;flex-direction:column;gap:16px}
        .id-field{display:flex;align-items:baseline;gap:8px}
        .id-field .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px}
        .id-field .f-label{font-size:12px;color:var(--text-muted);min-width:50px}
        .id-field .f-value{font-size:15px;font-weight:600;color:var(--text-primary)}
        .id-card-footer{
            display:flex;justify-content:space-around;
            padding:16px 20px;
            border-top:1.5px dashed var(--border);
            margin-top:20px;
        }
        .id-stat{text-align:center}
        .id-stat .sv{font-size:18px;font-weight:800;color:var(--text-primary)}
        .id-stat .sl{font-size:11px;color:var(--text-muted);margin-top:2px}

        /* Reminder Cards */
        .reminder-card{
            padding:14px 18px;
            border-radius:var(--radius-lg);
            margin-bottom:12px;
            display:flex;align-items:center;gap:12px;
        }
        .reminder-card.warn{background:var(--orange-light);border:1px solid rgba(255,167,38,0.2)}
        .reminder-card.danger{background:var(--red-light);border:1px solid rgba(239,83,80,0.2)}
        .reminder-card.ok{background:var(--green-light);border:1px solid rgba(102,187,106,0.2)}
        .reminder-card .rc-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .reminder-card.warn .rc-icon{background:rgba(255,167,38,0.15)}
        .reminder-card.danger .rc-icon{background:rgba(239,83,80,0.15)}
        .reminder-card.ok .rc-icon{background:rgba(102,187,106,0.15)}
        .reminder-card .rc-text{font-size:13px;font-weight:500;color:var(--text-primary)}
        .reminder-card .rc-sub{font-size:11px;color:var(--text-muted)}
        .reminder-card .rc-countdown{margin-left:auto;font-size:16px;font-weight:800;color:var(--text-primary);white-space:nowrap}

        /* Calendar */
        .cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .cal-nav-row h3{font-size:18px;font-weight:700}
        .cal-arrows{display:flex;gap:8px}
        .cal-arrows button{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
        .cal-arrows button:active{background:var(--pink-light)}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
        .cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);padding:4px 0}
        .cal-day{
            aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
            border-radius:var(--radius-xs);font-size:14px;font-weight:500;color:var(--text-primary);
            cursor:pointer;position:relative;transition:all 0.15s;gap:3px;
        }
        .cal-day:active{transform:scale(0.9)}
        .cal-day.today{background:var(--pink-light);color:var(--pink-text);font-weight:700}
        .cal-day.selected{background:var(--pink-deep);color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(255,143,175,0.3)}
        .cal-day.other{color:var(--text-muted);opacity:0.4}
        .cal-day .dots{display:flex;gap:2px;position:absolute;bottom:4px}
        .cal-day .dots span{width:4px;height:4px;border-radius:50%}

        .day-detail{background:var(--warm-50);border-radius:var(--radius-lg);padding:16px;border:1px solid var(--border)}
        .day-detail-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--border)}
        .day-detail-item:last-child{border-bottom:none}
        .day-detail-item .dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .day-detail-item .dd-text{font-size:13px;font-weight:500;color:var(--text-primary)}
        .day-detail-empty{text-align:center;padding:16px;font-size:13px;color:var(--text-muted)}

        /* Weight Chart */
        .chart-wrap{position:relative;width:100%;height:180px;margin:8px 0}
        .chart-wrap canvas{width:100%!important;height:100%!important}
        .weight-summary{display:flex;gap:12px;margin-bottom:16px}
        .ws-card{flex:1;padding:16px;border-radius:var(--radius-lg);text-align:center}
        .ws-card.current{background:var(--pink-light)}
        .ws-card.change{background:var(--green-light)}
        .ws-card.goal{background:var(--warm-200)}
        .ws-card .ws-val{font-size:22px;font-weight:800;color:var(--text-primary);margin-bottom:2px}
        .ws-card .ws-label{font-size:11px;color:var(--text-muted)}

        /* Feeding today */
        .feed-today-card{
            background:linear-gradient(135deg,var(--orange-light),var(--warm-100));
            border-radius:var(--radius-xl);padding:20px;margin-bottom:16px;
            border:1px solid rgba(255,167,38,0.1);
        }

        /* Segments */
        .seg-bar{display:flex;background:var(--warm-100);border-radius:var(--radius-sm);padding:4px;margin-bottom:16px}
        .seg-btn{flex:1;padding:9px 0;text-align:center;border-radius:var(--radius-xs);font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border:none;background:none;font-family:inherit;transition:all 0.2s}
        .seg-btn.active{background:var(--card);color:var(--text-primary);box-shadow:var(--shadow-card)}

        /* Timeline */
        .timeline{padding-left:20px;position:relative}
        .timeline::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:var(--border);border-radius:1px}
        .tl-item{position:relative;padding:0 0 20px 18px}
        .tl-item:last-child{padding-bottom:0}
        .tl-item::before{content:'';position:absolute;left:-18px;top:6px;width:10px;height:10px;border-radius:50%;border:2.5px solid var(--card)}
        .tl-item.c-pink::before{background:var(--pink-deep)}
        .tl-item.c-green::before{background:var(--green)}
        .tl-item.c-blue::before{background:var(--blue)}
        .tl-item.c-orange::before{background:var(--orange)}
        .tl-item .tl-date{font-size:11px;color:var(--text-muted);font-weight:500}
        .tl-item .tl-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-top:2px}
        .tl-item .tl-sub{font-size:12px;color:var(--text-muted);margin-top:2px}

        /* Expense */
        .expense-hero{
            background:linear-gradient(135deg,var(--pink-mid),var(--pink-deep));
            border-radius:var(--radius-xl);padding:24px;margin-bottom:16px;
            text-align:center;color:#fff;
        }
        .expense-hero .eh-label{font-size:12px;opacity:0.8;font-weight:500}
        .expense-hero .eh-value{font-size:36px;font-weight:800;letter-spacing:-1px;margin-top:4px}

        /* Pie chart */
        .pie-section{display:flex;align-items:center;gap:20px;padding:8px 0}
        .pie-canvas-wrap{width:90px;height:90px;flex-shrink:0;position:relative}
        .pie-canvas-wrap canvas{width:100%!important;height:100%!important}
        .legend-list{display:flex;flex-direction:column;gap:8px}
        .legend-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
        .legend-dot{width:10px;height:10px;border-radius:3px}

        /* More page */
        .more-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
        .more-card{
            padding:24px 16px;border-radius:var(--radius-xl);
            display:flex;flex-direction:column;align-items:center;gap:12px;
            cursor:pointer;transition:all 0.2s;
            box-shadow:var(--shadow-card);border:1px solid rgba(0,0,0,0.02);
        }
        .more-card:active{transform:scale(0.97);box-shadow:var(--shadow-card-hover)}
        .more-card.mc-immune{background:linear-gradient(160deg,#f0fff0,var(--green-light))}
        .more-card.mc-expense{background:linear-gradient(160deg,#fffaf0,var(--orange-light))}
        .more-card.mc-medical{background:linear-gradient(160deg,#f0f8ff,var(--blue-light))}
        .more-card.mc-photos{background:linear-gradient(160deg,#fdf0ff,var(--purple-light))}
        .more-card svg{width:32px;height:32px}
        .more-card .mc-title{font-size:14px;font-weight:700;color:var(--text-primary)}
        .more-card .mc-sub{font-size:11px;color:var(--text-muted)}

        /* Photos */
        .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .photo-item{aspect-ratio:1;border-radius:var(--radius-md);overflow:hidden;position:relative;cursor:pointer}
        .photo-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.2s}
        .photo-item:active img{transform:scale(1.05)}
        .photo-item .pm{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.5));color:#fff;padding:16px 8px 6px;font-size:10px;font-weight:500}
        .photo-item .pd{position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(255,255,255,0.9);border:none;border-radius:50%;font-size:11px;color:#ef5350;cursor:pointer;display:none;align-items:center;justify-content:center}
        .photo-item:active .pd{display:flex}
        .photo-add{aspect-ratio:1;border-radius:var(--radius-md);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:6px;color:var(--text-muted);font-size:11px;background:var(--warm-50)}
        .photo-add:active{border-color:var(--pink);background:var(--pink-light)}

        /* Modal */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(45,32,23,0.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:500;align-items:flex-end;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal{
            background:var(--card);border-radius:var(--radius-xl) var(--radius-xl) 0 0;
            padding:8px 20px calc(20px + var(--safe-b));
            width:100%;max-width:500px;max-height:88vh;max-height:88dvh;overflow-y:auto;
            box-shadow:0 -10px 40px rgba(0,0,0,0.12);
            animation:sheetUp 0.35s cubic-bezier(0.32,0.72,0,1);
        }
        @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
        .modal h3{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text-primary)}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.2px}
        .form-group input,.form-group select,.form-group textarea{
            width:100%;padding:12px 14px;
            border:1.5px solid var(--border);border-radius:var(--radius-sm);
            font-size:15px;font-family:inherit;outline:none;
            background:var(--warm-50);color:var(--text-primary);
            transition:all 0.2s;
        }
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pink);background:var(--card);box-shadow:0 0 0 4px rgba(255,143,175,0.08)}
        .form-group textarea{resize:vertical;min-height:60px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

        /* Chip select */
        .chip-group{display:flex;flex-wrap:wrap;gap:8px}
        .chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card);cursor:pointer;color:var(--text-secondary);transition:all 0.15s}
        .chip.active{background:var(--pink-light);border-color:var(--pink);color:var(--pink-text)}
        .chip:active{transform:scale(0.95)}

        /* Back */
        .back-row{display:flex;align-items:center;gap:6px;margin-bottom:16px;cursor:pointer;color:var(--text-muted);font-size:13px;font-weight:500}
        .back-row:active{color:var(--text-primary)}

        /* Lightbox */
        .lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:600;justify-content:center;align-items:center;cursor:pointer}
        .lightbox.show{display:flex}
        .lightbox img{max-width:95%;max-height:90%;border-radius:8px}

        /* Empty */
        .empty-state{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:13px}

        /* Section header */
        .section-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;margin-top:8px}

        @media(min-width:768px){
            .main{max-width:480px;padding:28px}
            .photo-grid{grid-template-columns:repeat(4,1fr)}
            .more-grid{gap:16px}
        }
    </style>
</head>
<body>
<div class="app">
    <main class="main">
        <!-- ========== PROFILE ========== -->
        <div id="p-profile" class="module active">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">

<!-- Modal -->
<div class="modal-overlay" id="mOverlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="mBody"></div></div>
<!-- Lightbox -->
<div class="lightbox" id="lb" onclick="this.classList.remove('show')"><img id="lbImg" src="" alt=""></div>
<!-- Hidden inputs -->
<input type="file" id="avInput" accept="image/*" style="display:none" onchange="handleAvatar(event)">
<input type="file" id="phInput" accept="image/*" style="display:none" onchange="handlePhoto(event)">

<script>
// =============== DATA ===============
const KEY='catcare_v5';
const INIT=()=>({profile:{name:'',breed:'',gender:'',birthday:'',adoptDate:'',sterilizeDate:'',color:'',chip:'',notes:'',avatar:''},weight:[],weightGoal:null,vaccine:[],deworm:[],medical:[],feeding:[],expense:[],photos:[],health:[]});
let D=(()=>{try{const d=JSON.parse(localStorage.getItem(KEY));return d&&d.profile?d:INIT()}catch(e){return INIT()}})();
const save=()=>localStorage.setItem(KEY,JSON.stringify(D));
const td=()=>new Date().toISOString().slice(0,10);
const gi=id=>document.getElementById(id).value;

// =============== NAV ===============
function go(p){
    document.querySelectorAll('.module').forEach(e=>e.classList.remove('active'));
    document.getElementById('p-'+p).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(e=>e.classList.remove('active'));
    const t=document.querySelector(`.tab-item[data-t="${p}"]`);if(t)t.classList.add('active');
    if(p==='weight')setTimeout(drawChart,80);
    if(p==='calendar')renderCalendar();
    if(p==='feeding')renderFeeding();
}
function goSub(p){
    document.querySelectorAll('.module').forEach(e=>e.classList.remove('active'));
    document.getElementById('p-'+p).classList.add('active');
    if(p==='expense')setTimeout(drawPie,80);
    if(p==='immune')renderImmune();
    if(p==='more'){document.querySelectorAll('.tab-item').forEach(e=>e.classList.remove('active'));document.querySelector('.tab-item[data-t="more"]').classList.add('active')}
}

// =============== MODAL ===============
function openModal(){document.getElementById('mOverlay').classList.add('show')}
function closeModal(){document.getElementById('mOverlay').classList.remove('show')}
function setModal(h){document.getElementById('mBody').innerHTML='<div class="modal-handle"></div>'+h;openModal()}

// =============== PROFILE ===============
function renderProfile(){
    const p=D.profile;
    // Avatar
    document.getElementById('avatarEl').innerHTML=p.avatar?`<img src="${p.avatar}" alt="">`:'🐱';
    // Greeting
    const h=new Date().getHours();
    document.getElementById('pGreeting').textContent=h<12?'早上好 ☀️':h<18?'下午好 🌤️':'晚上好 🌙';
    document.getElementById('pHello').textContent=p.name?`${p.name}的日常`:'这是你今天要做的事~';
    // ID card
    document.getElementById('idName').textContent=p.name||'未命名';
    const subParts=[];
    if(p.gender)subParts.push(p.gender==='公'?'♂ 男孩':'♀ 女孩');
    document.getElementById('idSub').textContent=subParts.join(' · ')||'设置猫咪信息';
    document.getElementById('idBreed').textContent=[p.breed,p.color,p.gender==='公'?'弟弟':'妹妹'].filter(Boolean).join(' · ');

    // Fields
    let fieldsHtml='';
    if(p.birthday){const age=calcAge(p.birthday);fieldsHtml+=`<div class="id-field"><span class="dot" style="background:var(--pink)"></span><span class="f-label">年龄</span><span class="f-value">${age}</span></div>`}
    if(p.birthday)fieldsHtml+=`<div class="id-field"><span class="dot" style="background:var(--orange)"></span><span class="f-label">生日</span><span class="f-value">${formatDate(p.birthday)}</span></div>`;
    if(p.adoptDate){const days=Math.ceil((new Date()-new Date(p.adoptDate))/864e5);fieldsHtml+=`<div class="id-field"><span class="dot" style="background:var(--pink-deep)"></span><span class="f-label">在一起</span><span class="f-value">${days} 天</span></div>`}
    if(p.sterilizeDate)fieldsHtml+=`<div class="id-field"><span class="dot" style="background:var(--green)"></span><span class="f-label">绝育</span><span class="f-value">${formatDate(p.sterilizeDate)}</span></div>`;
    if(p.chip)fieldsHtml+=`<div class="id-field"><span class="dot" style="background:var(--blue)"></span><span class="f-label">芯片</span><span class="f-value">${p.chip}</span></div>`;
    document.getElementById('idFields').innerHTML=fieldsHtml||'<p class="text-sm" style="text-align:center;padding:12px">点击编辑设置猫咪信息</p>';

    // Footer stats
    let footerHtml='';
    if(D.weight.length){const w=[...D.weight].sort((a,b)=>b.date.localeCompare(a.date))[0];footerHtml+=`<div class="id-stat"><div class="sv">${w.value} kg</div><div class="sl">最新体重</div></div>`}
    if(D.expense.length){const t=D.expense.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);footerHtml+=`<div class="id-stat"><div class="sv">¥${t.toFixed(0)}</div><div class="sl">累计花费</div></div>`}
    if(D.feeding.length){footerHtml+=`<div class="id-stat"><div class="sv">${D.feeding.length}</div><div class="sl">喂养次数</div></div>`}
    document.getElementById('idFooter').innerHTML=footerHtml||'';
    document.getElementById('idFooter').style.display=footerHtml?'flex':'none';

    // Reminders
    const todayStr=td();let rHtml='';
    const overdueV=D.vaccine.filter(r=>r.nextDate&&r.nextDate<todayStr);
    const overdueD=D.deworm.filter(r=>r.nextDate&&r.nextDate<todayStr);
    overdueV.forEach(r=>{rHtml+=reminderCard('danger','⚠️',r.name+' 已过期','应于 '+r.nextDate,'过期')});
    overdueD.forEach(r=>{rHtml+=reminderCard('danger','⚠️','驱虫已过期','应于 '+r.nextDate,'过期')});
    const nextV=D.vaccine.filter(r=>r.nextDate&&r.nextDate>=todayStr).sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
    const nextD=D.deworm.filter(r=>r.nextDate&&r.nextDate>=todayStr).sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
    if(nextV){const d=Math.ceil((new Date(nextV.nextDate)-new Date())/864e5);rHtml+=reminderCard(d<=7?'warn':'ok','💉',nextV.name,nextV.nextDate,'倒计时'+d+'天')}
    if(nextD){const d=Math.ceil((new Date(nextD.nextDate)-new Date())/864e5);rHtml+=reminderCard(d<=7?'warn':'ok','🛡️','驱虫',nextD.nextDate,'倒计时'+d+'天')}
    document.getElementById('pReminders').innerHTML=rHtml;
}

function reminderCard(type,icon,title,sub,countdown){
    return`<div class="reminder-card ${type}"><div class="rc-icon">${icon}</div><div><div class="rc-text">${title}</div><div class="rc-sub">${sub}</div></div><div class="rc-countdown">${countdown}</div></div>`;
}

function calcAge(b){const born=new Date(b),now=new Date();let m=(now.getFullYear()-born.getFullYear())*12+(now.getMonth()-born.getMonth());if(now.getDate()<born.getDate())m--;if(m<0)m=0;if(m>=12){const y=Math.floor(m/12),rm=m%12;return y+'岁'+(rm?rm+'个月':'')}return m+'个月'}
function formatDate(d){if(!d)return'';const parts=d.split('-');return parseInt(parts[1])+'月'+parseInt(parts[2])+'日'}

function editProfile(){
    const p=D.profile;
    setModal(`<h3>编辑档案</h3>
    <div class="form-row"><div class="form-group"><label>名字</label><input id="fp-n" value="${p.name||''}"></div><div class="form-group"><label>品种</label><input id="fp-b" value="${p.breed||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>性别</label><select id="fp-g"><option value="">-</option><option value="公"${p.gender==='公'?' selected':''}>公 ♂</option><option value="母"${p.gender==='母'?' selected':''}>母 ♀</option></select></div><div class="form-group"><label>毛色</label><input id="fp-c" value="${p.color||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>出生日期</label><input type="date" id="fp-bd" value="${p.birthday||''}"></div><div class="form-group"><label>接回日期</label><input type="date" id="fp-ad" value="${p.adoptDate||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>绝育日期</label><input type="date" id="fp-sd" value="${p.sterilizeDate||''}"></div><div class="form-group"><label>芯片号</label><input id="fp-ch" value="${p.chip||''}"></div></div>
    <div class="form-group"><label>备注</label><textarea id="fp-nt">${p.notes||''}</textarea></div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveProfile()">保存</button></div>`);
}
function saveProfile(){D.profile={...D.profile,name:gi('fp-n'),breed:gi('fp-b'),gender:gi('fp-g'),color:gi('fp-c'),birthday:gi('fp-bd'),adoptDate:gi('fp-ad'),sterilizeDate:gi('fp-sd'),chip:gi('fp-ch'),notes:gi('fp-nt')};save();renderProfile();closeModal()}
function handleAvatar(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{D.profile.avatar=ev.target.result;save();renderProfile()};r.readAsDataURL(f)}

// =============== CALENDAR ===============
let calY,calM,calSel=td();
(function(){const d=new Date();calY=d.getFullYear();calM=d.getMonth()})();

function renderCalendar(){
    document.getElementById('calTitle').textContent=`${calY}年${calM+1}月`;
    const grid=document.getElementById('calGrid');
    const dows=['日','一','二','三','四','五','六'];
    let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    const first=new Date(calY,calM,1).getDay();
    const days=new Date(calY,calM+1,0).getDate();
    const prev=new Date(calY,calM,0).getDate();
    const mStr=`${calY}-${String(calM+1).padStart(2,'0')}`;
    const evMap=getMonthEvents(mStr);
    for(let i=0;i<first;i++){html+=`<div class="cal-day other">${prev-first+1+i}</div>`}
    for(let d=1;d<=days;d++){
        const ds=`${mStr}-${String(d).padStart(2,'0')}`;
        const isT=ds===td(),isS=ds===calSel;
        const dots=evMap[ds]||[];
        let dotH=dots.length?`<div class="dots">${dots.slice(0,3).map(c=>`<span style="background:${c}"></span>`).join('')}</div>`:'';
        html+=`<div class="cal-day${isT?' today':''}${isS?' selected':''}" onclick="pickDay('${ds}')">${d}${dotH}</div>`;
    }
    const rem=42-(first+days);for(let i=1;i<=rem;i++)html+=`<div class="cal-day other">${i}</div>`;
    grid.innerHTML=html;
    renderDayDetail(calSel);
}
function getMonthEvents(m){
    const map={};
    const add=(d,c)=>{if(d&&d.startsWith(m))(map[d]=map[d]||[]).push(c)};
    D.vaccine.forEach(r=>{add(r.date,'var(--green)');add(r.nextDate,'var(--green)')});
    D.deworm.forEach(r=>{add(r.date,'var(--blue)');add(r.nextDate,'var(--blue)')});
    D.medical.forEach(r=>add(r.date,'var(--orange)'));
    D.health.forEach(r=>add(r.date,'var(--red)'));
    D.weight.forEach(r=>add(r.date,'var(--pink-deep)'));
    return map;
}
function pickDay(ds){calSel=ds;renderCalendar()}
function changeMonth(dir){calM+=dir;if(calM>11){calM=0;calY++}if(calM<0){calM=11;calY--}renderCalendar()}
function renderDayDetail(ds){
    const el=document.getElementById('dayDetail');
    const evs=[];
    D.vaccine.forEach(r=>{if(r.date===ds)evs.push({c:'var(--green)',t:'疫苗: '+r.name+(r.dose?' 第'+r.dose+'针':'')});if(r.nextDate===ds)evs.push({c:'var(--green)',t:'[预定] 疫苗: '+r.name})});
    D.deworm.forEach(r=>{if(r.date===ds)evs.push({c:'var(--blue)',t:'驱虫: '+(r.type||'')+(r.brand?' '+r.brand:'')});if(r.nextDate===ds)evs.push({c:'var(--blue)',t:'[预定] 驱虫'})});
    D.medical.forEach(r=>{if(r.date===ds)evs.push({c:'var(--orange)',t:'就诊: '+r.diagnosis})});

function drawChart(){
    const c=document.getElementById('wChart');if(!c)return;
    const ctx=c.getContext('2d');const rect=c.parentElement.getBoundingClientRect();
    c.width=rect.width*2;c.height=rect.height*2;ctx.scale(2,2);
    const W=rect.width,H=rect.height;ctx.clearRect(0,0,W,H);
    const sorted=[...D.weight].sort((a,b)=>a.date.localeCompare(b.date));
    if(sorted.length<2){ctx.fillStyle='#b8a99a';ctx.font='500 13px sans-serif';ctx.textAlign='center';ctx.fillText('需要至少 2 条记录',W/2,H/2);return}
    const vals=sorted.map(r=>r.value);
    let mn=Math.min(...vals)-0.3,mx=Math.max(...vals)+0.3;
    if(D.weightGoal){mn=Math.min(mn,D.weightGoal-0.3);mx=Math.max(mx,D.weightGoal+0.3)}
    const pad={t:24,r:12,b:28,l:38},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    // Horizontal grid
    ctx.strokeStyle='#f2ebe4';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=pad.t+(cH/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#b8a99a';ctx.font='500 10px -apple-system,sans-serif';ctx.textAlign='right';ctx.fillText((mx-(mx-mn)*i/4).toFixed(1),pad.l-6,y+3)}
    // Goal line
    if(D.weightGoal){const gy=pad.t+cH-((D.weightGoal-mn)/(mx-mn))*cH;ctx.setLineDash([5,4]);ctx.strokeStyle='var(--pink-deep)';ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#ff8fab';ctx.font='600 10px sans-serif';ctx.textAlign='right';ctx.fillText('目标 '+D.weightGoal,W-pad.r,gy-6)}
    // Points
    const pts=sorted.map((r,i)=>({x:pad.l+(cW/(sorted.length-1))*i,y:pad.t+cH-((r.value-mn)/(mx-mn))*cH,v:r.value}));
    // Area fill
    const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);grad.addColorStop(0,'rgba(255,143,175,0.15)');grad.addColorStop(1,'rgba(255,143,175,0)');
    ctx.beginPath();ctx.moveTo(pts[0].x,H-pad.b);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Line
    ctx.beginPath();ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.strokeStyle='#ff8fab';ctx.stroke();
    // Dots + labels
    pts.forEach((p,i)=>{
        ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#ff8fab';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
        // Value labels on dots
        ctx.fillStyle='#2d2017';ctx.font='700 11px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(p.v,p.x,p.y-10);
    });
    // X labels
    ctx.fillStyle='#b8a99a';ctx.font='500 10px sans-serif';ctx.textAlign='center';
    const step=Math.max(1,Math.floor(sorted.length/5));
    sorted.forEach((r,i)=>{if(i%step===0||i===sorted.length-1)ctx.fillText(r.date.slice(5),pts[i].x,H-pad.b+14)});
}

function drawPie(){

    const catMap={};D.expense.forEach(r=>{catMap[r.category]=(catMap[r.category]||0)+(parseFloat(r.amount)||0)});
    const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
    const total=cats.reduce((s,c)=>s+c[1],0);
    const colors={'粮食':'#ffa726','用品':'#42a5f5','医疗':'#66bb6a','玩具':'#ab47bc','洗护':'#ff8fab','其他':'#b8a99a'};
    const cx=90,cy=90,r=36;
    ctx.clearRect(0,0,180,180);
    if(!cats.length){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#f2ebe4';ctx.lineWidth=18;ctx.stroke();
        document.getElementById('pieLegend').innerHTML='<span class="text-sm">暂无数据</span>';return}
    let start=-Math.PI/2;
    cats.forEach(([cat,val])=>{const angle=(val/total)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,r,start,start+angle);ctx.strokeStyle=colors[cat]||'#b8a99a';ctx.lineWidth=18;ctx.lineCap='butt';ctx.stroke();start+=angle});
    document.getElementById('pieLegend').innerHTML=cats.map(([cat,val])=>`<div class="legend-row"><span class="legend-dot" style="background:${colors[cat]||'#b8a99a'}"></span>${cat} <span style="margin-left:auto;font-weight:600">¥${val.toFixed(0)}</span></div>`).join('');
}
function openExpenseForm(idx=-1){
    const e=idx>=0,r=e?D.expense[idx]:{date:td(),category:'',item:'',amount:'',note:''};
    setModal(`<h3>${e?'编辑':'记录'}消费</h3>
    <div class="form-row"><div class="form-group"><label>日期</label><input type="date" id="fe-d" value="${r.date}"></div><div class="form-group"><label>分类</label><select id="fe-c"><option value="">选择</option>${['粮食','用品','医疗','玩具','洗护','其他'].map(t=>`<option${r.category===t?' selected':''}>${t}</option>`).join('')}</select></div></div>
    <div class="form-row"><div class="form-group"><label>项目</label><input id="fe-i" value="${r.item||''}"></div><div class="form-group"><label>金额</label><input type="number" step="0.01" id="fe-a" value="${r.amount||''}"></div></div>
    <div class="form-group"><label>备注</label><input id="fe-n" value="${r.note||''}"></div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveExpense(${idx})">保存</button></div>`);
}
function saveExpense(idx){const r={date:gi('fe-d'),category:gi('fe-c'),item:gi('fe-i'),amount:gi('fe-a'),note:gi('fe-n')};if(!r.date||!r.category||!r.item||!r.amount){alert('请填写完整');return}if(idx>=0)D.expense[idx]=r;else D.expense.push(r);save();renderExpense();drawPie();renderProfile();closeModal()}

// =============== MEDICAL ===============
function renderMedical(){
    const sorted=[...D.medical].sort((a,b)=>b.date.localeCompare(a.date));
    const list=document.getElementById('mList'),em=document.getElementById('mEmpty');
    if(!sorted.length){list.innerHTML='';em.style.display='block';return}
    em.style.display='none';
    const tc=t=>({体检:'tag-orange',就诊:'tag-blue',手术:'tag-red',疫苗:'tag-green',驱虫:'tag-green'}[t]||'tag-warm');
    list.innerHTML=sorted.map(r=>{const i=D.medical.indexOf(r);return`<div class="record-item"><div class="ri-top"><div><div class="ri-title">${r.diagnosis}</div><div class="ri-sub">${r.date}${r.hospital?' · '+r.hospital:''}</div></div><div class="ri-right">${r.cost?'<div class="ri-value">¥'+r.cost+'</div>':''}<span class="tag ${tc(r.type)}">${r.type}</span></div></div><div class="ri-bottom"><span class="text-sm">${r.note||''}</span><div class="ri-actions"><button class="btn btn-ghost btn-sm" onclick="openMedicalForm(${i})">编辑</button><button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="delRec('medical',${i})">删除</button></div></div></div>`}).join('');
}
function openMedicalForm(idx=-1){
    const e=idx>=0,r=e?D.medical[idx]:{date:td(),type:'',diagnosis:'',hospital:'',cost:'',note:''};
    setModal(`<h3>${e?'编辑':'添加'}就诊记录</h3>
    <div class="form-row"><div class="form-group"><label>日期</label><input type="date" id="fm-d" value="${r.date}"></div><div class="form-group"><label>类型</label><select id="fm-t"><option value="">选择</option>${['体检','就诊','手术','疫苗','驱虫','其他'].map(t=>`<option${r.type===t?' selected':''}>${t}</option>`).join('')}</select></div></div>
    <div class="form-group"><label>项目/诊断</label><input id="fm-dg" value="${r.diagnosis||''}"></div>
    <div class="form-row"><div class="form-group"><label>医院</label><input id="fm-h" value="${r.hospital||''}"></div><div class="form-group"><label>费用</label><input type="number" id="fm-c" value="${r.cost||''}"></div></div>
    <div class="form-group"><label>备注</label><textarea id="fm-n">${r.note||''}</textarea></div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveMedical(${idx})">保存</button></div>`);
}
function saveMedical(idx){const r={date:gi('fm-d'),type:gi('fm-t'),diagnosis:gi('fm-dg'),hospital:gi('fm-h'),cost:gi('fm-c'),note:gi('fm-n')};if(!r.date||!r.type||!r.diagnosis){alert('请填写');return}if(idx>=0)D.medical[idx]=r;else D.medical.push(r);save();renderMedical();renderProfile();closeModal()}

// =============== PHOTOS ===============
function renderPhotos(){
    const sorted=[...D.photos].sort((a,b)=>b.date.localeCompare(a.date));
    const g=document.getElementById('photoGrid');
    g.innerHTML=sorted.map((p,i)=>{const idx=D.photos.indexOf(p);return`<div class="photo-item" onclick="document.getElementById('lbImg').src='${p.src}';document.getElementById('lb').classList.add('show')"><img src="${p.src}" alt=""><div class="pm">${p.date}${p.note?' · '+p.note:''}</div><button class="pd" onclick="event.stopPropagation();delRec('photos',${idx})">✕</button></div>`}).join('')+`<div class="photo-add" onclick="document.getElementById('phInput').click()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>上传</span></div>`;
}
function handlePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const n=prompt('备注（可选）：','')||'';D.photos.push({src:ev.target.result,date:td(),note:n});save();renderPhotos()};r.readAsDataURL(f);e.target.value=''}

// =============== DELETE ===============
function delRec(key,idx){if(!confirm('确认删除？'))return;D[key].splice(idx,1);save();renderAll()}

// =============== INIT ===============
function renderAll(){renderProfile();renderWeight();renderCalendar();renderFeeding();renderImmune();renderExpense();renderMedical();renderPhotos()}
renderAll();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
