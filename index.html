<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#fef7f9">
    <link rel="manifest" href="manifest.json">
    <title>Cat Care</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --pink-50:#fef7f9;--pink-100:#fdeef3;--pink-200:#fbd5e3;--pink-300:#f8a4c4;--pink-400:#f472a8;--pink-500:#e84a8a;
            --purple-50:#faf5ff;--purple-100:#f3e8ff;--purple-400:#a855f7;--purple-500:#9333ea;
            --blue-50:#eff6ff;--blue-100:#dbeafe;--blue-400:#60a5fa;--blue-500:#3b82f6;--blue-600:#2563eb;
            --green-50:#f0fdf4;--green-100:#dcfce7;--green-400:#4ade80;--green-500:#22c55e;--green-600:#16a34a;
            --orange-50:#fff7ed;--orange-100:#ffedd5;--orange-400:#fb923c;--orange-500:#f97316;--orange-600:#ea580c;
            --red-50:#fef2f2;--red-100:#fee2e2;--red-400:#f87171;--red-500:#ef4444;--red-600:#dc2626;
            --yellow-50:#fefce8;--yellow-100:#fef9c3;--yellow-400:#facc15;
            --white:#ffffff;
            --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;
            --shadow-xs:0 1px 2px rgba(0,0,0,0.03);
            --shadow-sm:0 1px 3px rgba(0,0,0,0.05),0 1px 2px rgba(0,0,0,0.03);
            --shadow:0 2px 8px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04);
            --shadow-md:0 4px 16px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg:0 10px 30px rgba(0,0,0,0.1);
            --shadow-pink:0 4px 14px rgba(244,114,168,0.15);
            --radius:14px;--radius-sm:10px;--radius-xs:7px;
            --bottom-h:62px;--safe-b:env(safe-area-inset-bottom,0px);
        }
        body{
            font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
            background:linear-gradient(160deg,var(--pink-50) 0%,#fff 40%,var(--purple-50) 100%);
            min-height:100vh;min-height:100dvh;
            color:var(--gray-700);font-size:14px;line-height:1.5;
            overflow-x:hidden;
        }

        /* === App Shell === */
        .app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;padding-bottom:calc(var(--bottom-h) + var(--safe-b))}

        /* === Bottom Tab === */
        .tab-bar{
            position:fixed;bottom:0;left:0;right:0;
            height:calc(var(--bottom-h) + var(--safe-b));padding-bottom:var(--safe-b);
            background:rgba(255,255,255,0.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
            border-top:1px solid rgba(0,0,0,0.06);
            display:flex;align-items:center;justify-content:space-around;
            z-index:200;
        }
        .tab-item{
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
            padding:4px 0;border:none;background:none;cursor:pointer;
            color:var(--gray-400);font-size:10px;font-family:inherit;
            min-width:52px;transition:color 0.2s;position:relative;
        }
        .tab-item.active{color:var(--pink-500)}
        .tab-item.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--pink-400);border-radius:1px}
        .tab-item svg{width:22px;height:22px;stroke-width:1.8}

        /* === Main === */
        .main{padding:16px 16px 8px;max-width:600px;margin:0 auto;width:100%}
        .module{display:none;animation:fadeIn 0.25s ease}
        .module.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* === Page Header === */
        .page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .page-hd h2{font-size:20px;font-weight:700;color:var(--gray-900);letter-spacing:-0.3px}

        /* === Cards === */
        .card{
            background:var(--white);border-radius:var(--radius);
            border:1px solid rgba(0,0,0,0.05);
            padding:16px;margin-bottom:12px;
            box-shadow:var(--shadow-sm);
            position:relative;overflow:hidden;
        }
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;border-radius:var(--radius) var(--radius) 0 0}
        .card.accent-pink::before{background:linear-gradient(90deg,var(--pink-300),var(--pink-400))}
        .card.accent-blue::before{background:linear-gradient(90deg,var(--blue-400),var(--blue-500))}
        .card.accent-green::before{background:linear-gradient(90deg,var(--green-400),var(--green-500))}
        .card.accent-purple::before{background:linear-gradient(90deg,var(--purple-400),var(--purple-500))}
        .card.accent-orange::before{background:linear-gradient(90deg,var(--orange-400),var(--orange-500))}

        .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .card-title{font-size:12px;font-weight:600;color:var(--gray-500);letter-spacing:0.2px}
        .card-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}

        /* === Buttons === */
        .btn{
            padding:8px 14px;border-radius:var(--radius-xs);border:none;cursor:pointer;
            font-size:13px;font-weight:500;transition:all 0.15s;
            display:inline-flex;align-items:center;gap:5px;font-family:inherit;
        }
        .btn-primary{background:linear-gradient(135deg,var(--pink-400),var(--pink-500));color:#fff;box-shadow:var(--shadow-pink)}
        .btn-primary:active{transform:scale(0.96)}
        .btn-outline{background:var(--white);color:var(--gray-600);border:1px solid var(--gray-200);box-shadow:var(--shadow-xs)}
        .btn-outline:active{background:var(--gray-50)}
        .btn-ghost{background:none;color:var(--gray-500);padding:5px 8px}
        .btn-ghost:active{background:var(--gray-100)}
        .btn-sm{padding:6px 10px;font-size:12px}
        .btn-danger{background:none;color:var(--red-500);padding:5px 8px}

        /* === Stat Cards === */
        .stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
        .stat-card{
            padding:14px;border-radius:var(--radius-sm);
            position:relative;overflow:hidden;
        }
        .stat-card.pink{background:linear-gradient(135deg,var(--pink-50),var(--pink-100))}
        .stat-card.blue{background:linear-gradient(135deg,var(--blue-50),var(--blue-100))}
        .stat-card.green{background:linear-gradient(135deg,var(--green-50),var(--green-100))}
        .stat-card.purple{background:linear-gradient(135deg,var(--purple-50),var(--purple-100))}
        .stat-card.orange{background:linear-gradient(135deg,var(--orange-50),var(--orange-100))}
        .stat-card .s-label{font-size:11px;color:var(--gray-500);font-weight:500;margin-bottom:4px}
        .stat-card .s-value{font-size:16px;font-weight:700;color:var(--gray-800)}
        .stat-card .s-icon{position:absolute;right:10px;bottom:10px;font-size:24px;opacity:0.15}

        /* === Tables === */
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}
        table{width:100%;border-collapse:collapse;min-width:480px}
        thead th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--gray-400);border-bottom:1px solid var(--gray-100);white-space:nowrap}
        tbody td{padding:10px;border-bottom:1px solid var(--gray-50);font-size:13px}
        tbody tr:last-child td{border-bottom:none}
        .actions{white-space:nowrap}

        /* === Tags === */
        .tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
        .tag-pink{background:var(--pink-100);color:var(--pink-500)}
        .tag-blue{background:var(--blue-100);color:var(--blue-600)}
        .tag-green{background:var(--green-100);color:var(--green-600)}
        .tag-orange{background:var(--orange-100);color:var(--orange-600)}
        .tag-purple{background:var(--purple-100);color:var(--purple-500)}
        .tag-red{background:var(--red-100);color:var(--red-600)}
        .tag-gray{background:var(--gray-100);color:var(--gray-600)}

        /* === Profile Overview === */
        .profile-hero{
            text-align:center;padding:24px 16px 20px;
            background:linear-gradient(180deg,var(--pink-50) 0%,transparent 100%);
            border-radius:var(--radius);margin-bottom:12px;
            border:1px solid rgba(244,114,168,0.1);
        }
        .avatar{
            width:72px;height:72px;border-radius:50%;margin:0 auto 12px;
            background:linear-gradient(135deg,var(--pink-100),var(--pink-200));
            display:flex;align-items:center;justify-content:center;
            font-size:32px;cursor:pointer;overflow:hidden;
            border:3px solid var(--white);box-shadow:0 4px 12px rgba(244,114,168,0.2);
        }
        .avatar img{width:100%;height:100%;object-fit:cover}
        .profile-hero h2{font-size:20px;font-weight:700;color:var(--gray-900);margin-bottom:2px}
        .profile-hero p{font-size:13px;color:var(--gray-500)}

        /* === Reminders === */
        .reminder{
            padding:10px 14px;border-radius:var(--radius-sm);
            font-size:12px;margin-bottom:10px;
            display:flex;align-items:center;gap:8px;
            border:1px solid transparent;
        }
        .reminder.warn{background:var(--orange-50);border-color:rgba(249,115,22,0.15);color:var(--orange-600)}
        .reminder.danger{background:var(--red-50);border-color:rgba(239,68,68,0.15);color:var(--red-600)}
        .reminder.ok{background:var(--green-50);border-color:rgba(34,197,94,0.15);color:var(--green-600)}
        .reminder .r-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .reminder.warn .r-dot{background:var(--orange-500)}
        .reminder.danger .r-dot{background:var(--red-500)}
        .reminder.ok .r-dot{background:var(--green-500)}

        /* === Calendar === */
        .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .cal-header h3{font-size:16px;font-weight:700;color:var(--gray-800)}
        .cal-nav{display:flex;gap:6px}
        .cal-nav button{width:30px;height:30px;border-radius:50%;border:1px solid var(--gray-200);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-500);font-size:14px}
        .cal-nav button:active{background:var(--gray-100)}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
        .cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--gray-400);padding:4px 0}
        .cal-day{
            aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
            border-radius:var(--radius-xs);font-size:13px;color:var(--gray-700);
            cursor:pointer;position:relative;transition:all 0.15s;gap:2px;
        }
        .cal-day:active{transform:scale(0.92)}
        .cal-day.today{background:var(--pink-100);color:var(--pink-500);font-weight:700}
        .cal-day.selected{background:var(--pink-400);color:#fff;font-weight:600;box-shadow:var(--shadow-pink)}
        .cal-day.other{color:var(--gray-300)}
        .cal-day .dots{display:flex;gap:2px;position:absolute;bottom:3px}
        .cal-day .dots span{width:4px;height:4px;border-radius:50%}

        .day-events{
            background:var(--gray-50);border-radius:var(--radius-sm);padding:12px;
            border:1px solid var(--gray-100);min-height:60px;
        }
        .day-events .de-item{
            display:flex;align-items:center;gap:8px;padding:6px 0;
            border-bottom:1px solid var(--gray-100);font-size:13px;
        }
        .day-events .de-item:last-child{border-bottom:none}
        .day-events .de-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .day-events .de-empty{text-align:center;color:var(--gray-400);font-size:12px;padding:12px}

        /* === Chart === */
        .chart-box{position:relative;width:100%;height:170px;margin:8px 0}
        .chart-box canvas{width:100%!important;height:100%!important}

        /* === Expense Chart === */
        .expense-chart{display:flex;align-items:center;gap:16px;padding:8px 0}
        .pie-wrap{position:relative;width:100px;height:100px;flex-shrink:0}
        .pie-wrap canvas{width:100%!important;height:100%!important}
        .pie-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
        .pie-center .pc-val{font-size:14px;font-weight:700;color:var(--gray-800)}
        .pie-center .pc-label{font-size:10px;color:var(--gray-400)}
        .legend{display:flex;flex-direction:column;gap:6px}
        .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-600)}
        .legend-item .l-dot{width:8px;height:8px;border-radius:2px}

        /* === Segments (Vaccine/Deworm) === */
        .seg-tabs{display:flex;background:var(--gray-100);border-radius:var(--radius-xs);padding:3px;margin-bottom:14px}
        .seg-tab{flex:1;padding:7px 0;text-align:center;border-radius:5px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;transition:all 0.2s;border:none;background:none;font-family:inherit}
        .seg-tab.active{background:var(--white);color:var(--gray-800);box-shadow:var(--shadow-sm)}

        /* === Timeline === */
        .timeline{padding-left:16px;position:relative}
        .timeline::before{content:'';position:absolute;left:4px;top:6px;bottom:6px;width:2px;background:var(--gray-200);border-radius:1px}
        .tl-item{position:relative;padding:0 0 16px 16px}
        .tl-item:last-child{padding-bottom:0}
        .tl-item::before{content:'';position:absolute;left:-14px;top:6px;width:8px;height:8px;border-radius:50%;border:2px solid var(--white);box-shadow:var(--shadow-xs)}
        .tl-item.pink::before{background:var(--pink-400)}
        .tl-item.blue::before{background:var(--blue-400)}
        .tl-item.green::before{background:var(--green-400)}
        .tl-item.orange::before{background:var(--orange-400)}
        .tl-item .tl-date{font-size:11px;color:var(--gray-400)}
        .tl-item .tl-text{font-size:13px;color:var(--gray-700);margin-top:1px}
        .tl-item .tl-sub{font-size:11px;color:var(--gray-400);margin-top:2px}

        /* === Photos === */
        .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
        .photo-item{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer}
        .photo-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.2s}
        .photo-item:active img{transform:scale(1.03)}
        .photo-item .p-meta{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.5));color:#fff;padding:14px 6px 5px;font-size:10px}
        .photo-item .p-del{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(255,255,255,0.9);border:none;border-radius:50%;font-size:10px;color:var(--red-500);cursor:pointer;display:none;align-items:center;justify-content:center}
        .photo-item:active .p-del{display:flex}
        .photo-add{aspect-ratio:1;border-radius:var(--radius-sm);border:1.5px dashed var(--gray-300);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-400);gap:4px;font-size:11px}
        .photo-add:active{border-color:var(--pink-400);background:var(--pink-50)}

        /* === More Page === */
        .more-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
        .more-item{
            padding:20px 16px;border-radius:var(--radius);cursor:pointer;
            display:flex;flex-direction:column;align-items:center;gap:10px;
            border:1px solid rgba(0,0,0,0.04);transition:transform 0.15s;
            box-shadow:var(--shadow-sm);
        }
        .more-item:active{transform:scale(0.97)}
        .more-item.mi-immune{background:linear-gradient(135deg,var(--green-50),var(--green-100))}
        .more-item.mi-expense{background:linear-gradient(135deg,var(--orange-50),var(--orange-100))}
        .more-item.mi-medical{background:linear-gradient(135deg,var(--blue-50),var(--blue-100))}
        .more-item.mi-photo{background:linear-gradient(135deg,var(--purple-50),var(--purple-100))}
        .more-item svg{width:28px;height:28px}
        .more-item .mi-label{font-size:13px;font-weight:600;color:var(--gray-700)}
        .more-item .mi-sub{font-size:11px;color:var(--gray-500)}

        /* === Modal === */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:500;justify-content:center;align-items:flex-end}
        .modal-overlay.show{display:flex}
        .modal{
            background:var(--white);border-radius:var(--radius) var(--radius) 0 0;
            padding:20px 16px calc(16px + var(--safe-b));
            width:100%;max-width:500px;max-height:85vh;max-height:85dvh;overflow-y:auto;
            box-shadow:var(--shadow-lg);animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
        }
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-handle{width:36px;height:4px;border-radius:2px;background:var(--gray-300);margin:0 auto 16px}
        .modal h3{font-size:16px;font-weight:700;color:var(--gray-800);margin-bottom:16px}

        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:12px;font-weight:500;color:var(--gray-500);margin-bottom:4px}
        .form-group input,.form-group select,.form-group textarea{
            width:100%;padding:10px 12px;border:1px solid var(--gray-200);border-radius:var(--radius-xs);
            font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s,box-shadow 0.2s;
            background:var(--gray-50);
        }
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pink-300);box-shadow:0 0 0 3px rgba(244,114,168,0.08);background:var(--white)}
        .form-group textarea{resize:vertical;min-height:60px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

        /* quick select chips */
        .chip-group{display:flex;flex-wrap:wrap;gap:6px}
        .chip{padding:6px 12px;border-radius:20px;font-size:12px;border:1px solid var(--gray-200);background:var(--white);cursor:pointer;color:var(--gray-600);transition:all 0.15s}
        .chip.active{background:var(--pink-100);border-color:var(--pink-300);color:var(--pink-500);font-weight:500}
        .chip:active{transform:scale(0.95)}

        /* === Lightbox === */
        .lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:600;justify-content:center;align-items:center;cursor:pointer}
        .lightbox.show{display:flex}
        .lightbox img{max-width:95%;max-height:90%;border-radius:6px}

        /* === Empty === */
        .empty{text-align:center;padding:24px 12px;color:var(--gray-400);font-size:13px}

        /* === Back button for sub pages === */
        .back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--gray-500);cursor:pointer;border:none;background:none;padding:4px 0;margin-bottom:12px;font-family:inherit}
        .back-btn:active{color:var(--gray-700)}

        /* === Progress Ring === */
        .ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
        .ring-wrap svg{transform:rotate(-90deg)}
        .ring-label{position:absolute;text-align:center}
        .ring-label .rv{font-size:14px;font-weight:700;color:var(--gray-800)}
        .ring-label .rl{font-size:9px;color:var(--gray-400)}

        /* Desktop */
        @media(min-width:768px){
            .main{max-width:520px;padding:24px}
            .stat-row{grid-template-columns:repeat(3,1fr)}
            .photo-grid{grid-template-columns:repeat(4,1fr);gap:10px}
            .more-grid{grid-template-columns:repeat(4,1fr)}
        }
    </style>
</head>
<body>
<div class="app">
    <main class="main">
        <!-- === Profile === -->
        <div id="p-profile" class="module active">
            <div class="profile-hero">
                <div class="avatar" id="avatarEl" onclick="document.getElementById('avInput').click()">🐱</div>
                <h2 id="pName">未命名</h2>
                <p id="pSub">设置猫咪信息</p>
            </div>
            <div id="pReminders"></div>
            <div class="stat-row" id="pStats"></div>
            <div class="card accent-pink">
                <div class="card-hd"><span class="card-title">最近体重</span></div>
                <div id="pWeight"></div>
            </div>
            <div class="card accent-blue">
                <div class="card-hd"><span class="card-title">近期事项</span></div>
                <div id="pEvents"></div>
            </div>
            <div style="text-align:center;margin-top:8px">
                <button class="btn btn-outline btn-sm" onclick="editProfile()">编辑档案</button>
            </div>
        </div>

        <!-- === Calendar === -->
        <div id="p-calendar" class="module">
            <div class="page-hd"><h2>月历</h2><button class="btn btn-primary btn-sm" onclick="openHealthForm()">+ 异常</button></div>

<script>
// ==================== DATA ====================
const KEY='catcare_v4';
const D_INIT=()=>({profile:{name:'',breed:'',gender:'',birthday:'',adoptDate:'',sterilizeDate:'',color:'',chip:'',notes:'',avatar:''},weight:[],weightGoal:null,vaccine:[],deworm:[],medical:[],feeding:[],expense:[],photos:[],health:[]});
let D=(()=>{try{const d=JSON.parse(localStorage.getItem(KEY));return d&&d.profile?d:D_INIT()}catch(e){return D_INIT()}})();
const save=()=>localStorage.setItem(KEY,JSON.stringify(D));
const today=()=>new Date().toISOString().slice(0,10);

// ==================== NAV ====================
let currentPage='profile';
function go(page){
    document.querySelectorAll('.module').forEach(e=>e.classList.remove('active'));
    document.getElementById('p-'+page).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(e=>e.classList.remove('active'));
    const t=document.querySelector(`.tab-item[data-t="${page}"]`);if(t)t.classList.add('active');
    currentPage=page;
    if(page==='weight')setTimeout(drawWeightChart,80);
    if(page==='calendar')renderCalendar();
    if(page==='feeding')renderFeeding();
}
function goSub(page){
    document.querySelectorAll('.module').forEach(e=>e.classList.remove('active'));
    document.getElementById('p-'+page).classList.add('active');
    currentPage=page;
    if(page==='expense')setTimeout(drawPie,80);
    if(page==='more'){document.querySelectorAll('.tab-item').forEach(e=>e.classList.remove('active'));document.querySelector('.tab-item[data-t="more"]').classList.add('active')}
}

// ==================== MODAL ====================
function openModal(){document.getElementById('mOverlay').classList.add('show')}
function closeModal(){document.getElementById('mOverlay').classList.remove('show')}
function setModal(h){document.getElementById('mBody').innerHTML='<div class="modal-handle"></div>'+h;openModal()}

// ==================== PROFILE ====================
function renderProfile(){
    const p=D.profile;
    const av=document.getElementById('avatarEl');
    av.innerHTML=p.avatar?`<img src="${p.avatar}" alt="">`:'🐱';
    document.getElementById('pName').textContent=p.name||'未命名';
    const parts=[];
    if(p.breed)parts.push(p.breed);
    if(p.gender)parts.push(p.gender==='公'?'♂':'♀');
    if(p.birthday)parts.push(calcAge(p.birthday));
    document.getElementById('pSub').textContent=parts.join(' · ')||'点击下方编辑设置信息';

    // Stats
    let statsHtml='';
    if(p.birthday)statsHtml+=`<div class="stat-card pink"><div class="s-label">年龄</div><div class="s-value">${calcAge(p.birthday)}</div><div class="s-icon">🎂</div></div>`;
    if(D.weight.length){const s=[...D.weight].sort((a,b)=>b.date.localeCompare(a.date));statsHtml+=`<div class="stat-card green"><div class="s-label">体重</div><div class="s-value">${s[0].value} kg</div><div class="s-icon">⚖</div></div>`}
    if(p.adoptDate){const days=Math.ceil((new Date()-new Date(p.adoptDate))/864e5);statsHtml+=`<div class="stat-card blue"><div class="s-label">在一起</div><div class="s-value">${days} 天</div><div class="s-icon">🏠</div></div>`}
    if(D.expense.length){const t=D.expense.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);statsHtml+=`<div class="stat-card orange"><div class="s-label">总花费</div><div class="s-value">¥${t.toFixed(0)}</div><div class="s-icon">💰</div></div>`}
    document.getElementById('pStats').innerHTML=statsHtml;

    // Reminders
    const todayStr=today();
    let rHtml='';
    const overdueV=D.vaccine.filter(r=>r.nextDate&&r.nextDate<todayStr);
    const overdueD=D.deworm.filter(r=>r.nextDate&&r.nextDate<todayStr);
    if(overdueV.length)rHtml+=`<div class="reminder danger"><span class="r-dot"></span>${overdueV.length}项疫苗已过期</div>`;
    if(overdueD.length)rHtml+=`<div class="reminder warn"><span class="r-dot"></span>${overdueD.length}项驱虫已过期</div>`;
    const nextV=D.vaccine.filter(r=>r.nextDate&&r.nextDate>=todayStr).sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
    const nextD=D.deworm.filter(r=>r.nextDate&&r.nextDate>=todayStr).sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
    if(nextV&&!overdueV.length){const d=Math.ceil((new Date(nextV.nextDate)-new Date())/864e5);rHtml+=`<div class="reminder ${d<=7?'warn':'ok'}"><span class="r-dot"></span>${nextV.name} ${nextV.nextDate}（${d}天后）</div>`}
    if(nextD&&!overdueD.length){const d=Math.ceil((new Date(nextD.nextDate)-new Date())/864e5);rHtml+=`<div class="reminder ${d<=7?'warn':'ok'}"><span class="r-dot"></span>驱虫 ${nextD.nextDate}（${d}天后）</div>`}
    document.getElementById('pReminders').innerHTML=rHtml;

    // Recent weight
    const wEl=document.getElementById('pWeight');
    if(D.weight.length){const r=[...D.weight].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);wEl.innerHTML=r.map(w=>`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px"><span style="color:var(--gray-500)">${w.date}</span><span style="font-weight:600">${w.value} kg</span></div>`).join('')}else{wEl.innerHTML='<div class="empty">暂无</div>'}

    // Recent events
    const eEl=document.getElementById('pEvents');
    const events=[];
    D.vaccine.forEach(r=>events.push({date:r.date,text:'疫苗: '+r.name,color:'green'}));
    D.deworm.forEach(r=>events.push({date:r.date,text:'驱虫: '+(r.brand||r.type),color:'blue'}));
    D.medical.forEach(r=>events.push({date:r.date,text:'就诊: '+r.diagnosis,color:'orange'}));
    events.sort((a,b)=>b.date.localeCompare(a.date));
    if(events.length){eEl.innerHTML=events.slice(0,4).map(e=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px"><span class="tag tag-${e.color}" style="min-width:fit-content">${e.date}</span><span>${e.text}</span></div>`).join('')}else{eEl.innerHTML='<div class="empty">暂无</div>'}
}

function calcAge(b){const born=new Date(b),now=new Date();let m=(now.getFullYear()-born.getFullYear())*12+(now.getMonth()-born.getMonth());if(now.getDate()<born.getDate())m--;if(m<0)m=0;return m>=12?(Math.floor(m/12)+'岁'+(m%12?m%12+'月':'')):m+'个月'}

function editProfile(){
    const p=D.profile;
    setModal(`<h3>编辑档案</h3>
    <div class="form-row"><div class="form-group"><label>名字</label><input id="fp-n" value="${p.name||''}"></div><div class="form-group"><label>品种</label><input id="fp-b" value="${p.breed||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>性别</label><select id="fp-g"><option value="">-</option><option value="公"${p.gender==='公'?' selected':''}>公 ♂</option><option value="母"${p.gender==='母'?' selected':''}>母 ♀</option></select></div><div class="form-group"><label>毛色</label><input id="fp-c" value="${p.color||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>出生日期</label><input type="date" id="fp-bd" value="${p.birthday||''}"></div><div class="form-group"><label>接回日期</label><input type="date" id="fp-ad" value="${p.adoptDate||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>绝育日期</label><input type="date" id="fp-sd" value="${p.sterilizeDate||''}"></div><div class="form-group"><label>芯片号</label><input id="fp-ch" value="${p.chip||''}"></div></div>
    <div class="form-group"><label>备注</label><textarea id="fp-nt">${p.notes||''}</textarea></div>
    <div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveProfile()">保存</button></div>`);
}
function saveProfile(){D.profile={...D.profile,name:gi('fp-n'),breed:gi('fp-b'),gender:gi('fp-g'),color:gi('fp-c'),birthday:gi('fp-bd'),adoptDate:gi('fp-ad'),sterilizeDate:gi('fp-sd'),chip:gi('fp-ch'),notes:gi('fp-nt')};save();renderProfile();closeModal()}
function handleAvatar(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{D.profile.avatar=ev.target.result;save();renderProfile()};r.readAsDataURL(f)}
function gi(id){return document.getElementById(id).value}

// ==================== CALENDAR ====================
let calYear,calMonth,calSelected=today();
(function(){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth()})();

function renderCalendar(){
    document.getElementById('calTitle').textContent=`${calYear}年${calMonth+1}月`;
    const grid=document.getElementById('calGrid');
    const dows=['日','一','二','三','四','五','六'];
    let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const prevDays=new Date(calYear,calMonth,0).getDate();
    const todayStr=today();

    // Get events for this month
    const monthStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
    const eventDays=getMonthEvents(monthStr);

    for(let i=0;i<firstDay;i++){const d=prevDays-firstDay+1+i;html+=`<div class="cal-day other">${d}</div>`}
    for(let d=1;d<=daysInMonth;d++){
        const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday=dateStr===todayStr;
        const isSel=dateStr===calSelected;
        const dots=eventDays[dateStr]||[];
        let dotHtml='';
        if(dots.length)dotHtml=`<div class="dots">${dots.slice(0,3).map(c=>`<span style="background:var(--${c}-400)"></span>`).join('')}</div>`;
        html+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${dateStr}')">${d}${dotHtml}</div>`;
    }
    const remain=42-(firstDay+daysInMonth);
    for(let i=1;i<=remain;i++){html+=`<div class="cal-day other">${i}</div>`}
    grid.innerHTML=html;
    renderDayEvents(calSelected);
}

function getMonthEvents(monthStr){
    const map={};
    D.vaccine.forEach(r=>{if(r.date.startsWith(monthStr)){(map[r.date]=map[r.date]||[]).push('green')}if(r.nextDate&&r.nextDate.startsWith(monthStr)){(map[r.nextDate]=map[r.nextDate]||[]).push('green')}});
    D.deworm.forEach(r=>{if(r.date.startsWith(monthStr)){(map[r.date]=map[r.date]||[]).push('blue')}if(r.nextDate&&r.nextDate.startsWith(monthStr)){(map[r.nextDate]=map[r.nextDate]||[]).push('blue')}});
    D.medical.forEach(r=>{if(r.date.startsWith(monthStr)){(map[r.date]=map[r.date]||[]).push('orange')}});
    D.health.forEach(r=>{if(r.date.startsWith(monthStr)){(map[r.date]=map[r.date]||[]).push('red')}});
    D.weight.forEach(r=>{if(r.date.startsWith(monthStr)){(map[r.date]=map[r.date]||[]).push('pink')}});
    return map;
}

function selectDay(dateStr){calSelected=dateStr;renderCalendar()}
function changeMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCalendar()}

function renderDayEvents(dateStr){
    const el=document.getElementById('dayEvents');
    const events=[];
    D.vaccine.forEach(r=>{if(r.date===dateStr)events.push({color:'green',text:`疫苗接种: ${r.name}${r.dose?' 第'+r.dose+'针':''}`});if(r.nextDate===dateStr)events.push({color:'green',text:`[预定] 疫苗: ${r.name}`})});
    D.deworm.forEach(r=>{if(r.date===dateStr)events.push({color:'blue',text:`驱虫: ${r.type||''}${r.brand?' '+r.brand:''}`});if(r.nextDate===dateStr)events.push({color:'blue',text:`[预定] 驱虫`})});
    D.medical.forEach(r=>{if(r.date===dateStr)events.push({color:'orange',text:`就诊: ${r.diagnosis}`})});
    D.health.forEach(r=>{if(r.date===dateStr)events.push({color:'red',text:`异常: ${r.type}${r.severity?' ('+r.severity+')':''}${r.note?' - '+r.note:''}`})});
    D.weight.forEach(r=>{if(r.date===dateStr)events.push({color:'pink',text:`体重: ${r.value} kg`})});
    D.feeding.filter(r=>r.date===dateStr).forEach(r=>{events.push({color:'gray',text:`喂养: ${r.type}${r.brand?' '+r.brand:''} ${r.amount||''}`})});

    if(!events.length){el.innerHTML=`<div class="de-empty">${dateStr} 无事项</div>`;return}
    el.innerHTML=events.map(e=>`<div class="de-item"><span class="de-dot" style="background:var(--${e.color}-400)"></span><span>${e.text}</span></div>`).join('');
}

// Health record

// ==================== WEIGHT ====================
function renderWeight(){
    const sorted=[...D.weight].sort((a,b)=>b.date.localeCompare(a.date));
    const tb=document.getElementById('wTb'),em=document.getElementById('wEmpty');
    if(!sorted.length){tb.innerHTML='';em.style.display='block';return}
    em.style.display='none';
    tb.innerHTML=sorted.map((r,i)=>{
        const idx=D.weight.indexOf(r);const prev=sorted[i+1];
        let chg='-';
        if(prev){const d=(r.value-prev.value).toFixed(2);chg=d>0?`<span style="color:var(--green-600)">+${d}</span>`:d<0?`<span style="color:var(--red-600)">${d}</span>`:'0'}
        return`<tr><td>${r.date}</td><td>${r.value} kg</td><td>${chg}</td><td>${r.note||'-'}</td><td class="actions"><button class="btn btn-ghost btn-sm" onclick="openWeightForm(${idx})">编辑</button><button class="btn btn-danger btn-sm" onclick="delRec('weight',${idx})">删除</button></td></tr>`
    }).join('');
}

function drawWeightChart(){
    const c=document.getElementById('wChart');if(!c)return;
    const ctx=c.getContext('2d');const rect=c.parentElement.getBoundingClientRect();
    c.width=rect.width*2;c.height=rect.height*2;ctx.scale(2,2);
    const W=rect.width,H=rect.height;ctx.clearRect(0,0,W,H);
    const sorted=[...D.weight].sort((a,b)=>a.date.localeCompare(b.date));
    if(sorted.length<2){ctx.fillStyle='#9ca3af';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('需要至少2条记录',W/2,H/2);return}
    const vals=sorted.map(r=>r.value);
    let mn=Math.min(...vals)-0.3,mx=Math.max(...vals)+0.3;
    if(D.weightGoal){mn=Math.min(mn,D.weightGoal-0.3);mx=Math.max(mx,D.weightGoal+0.3)}
    const pad={t:14,r:14,b:22,l:34},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    // Grid
    ctx.strokeStyle='#f3f4f6';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=pad.t+(cH/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#9ca3af';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText((mx-(mx-mn)*i/4).toFixed(1),pad.l-4,y+3)}
    // Goal line
    if(D.weightGoal){
        const gy=pad.t+cH-((D.weightGoal-mn)/(mx-mn))*cH;
        ctx.setLineDash([4,3]);ctx.strokeStyle='#f472a8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='#f472a8';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText('目标 '+D.weightGoal,W-pad.r-40,gy-4);
    }
    const pts=sorted.map((r,i)=>({x:pad.l+(cW/(sorted.length-1))*i,y:pad.t+cH-((r.value-mn)/(mx-mn))*cH}));
    // Fill
    const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);grad.addColorStop(0,'rgba(34,197,94,0.1)');grad.addColorStop(1,'rgba(34,197,94,0)');
    ctx.beginPath();ctx.moveTo(pts[0].x,H-pad.b);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Line
    ctx.beginPath();ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.strokeStyle='#22c55e';ctx.stroke();
    // Dots
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle='#22c55e';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke()});
    // X labels
    ctx.fillStyle='#9ca3af';ctx.font='10px sans-serif';ctx.textAlign='center';
    const step=Math.max(1,Math.floor(sorted.length/5));
    sorted.forEach((r,i)=>{if(i%step===0||i===sorted.length-1)ctx.fillText(r.date.slice(5),pts[i].x,H-pad.b+12)});
}

function renderImmune(){

    const vSorted=[...D.vaccine].sort((a,b)=>b.date.localeCompare(a.date));

        vTb.innerHTML=vSorted.map(r=>{const i=D.vaccine.indexOf(r);return`<tr><td>${r.date}</td><td>${r.name}</td><td>${r.dose||'-'}</td><td>${r.nextDate||'-'}</td><td>${r.hospital||'-'}</td><td class="actions"><button class="btn btn-ghost btn-sm" onclick="openVaccineForm(${i})">编辑</button><button class="btn btn-danger btn-sm" onclick="delRec('vaccine',${i})">删除</button></td></tr>`}).join('');

    }
    // Deworm
    const dSorted=[...D.deworm].sort((a,b)=>b.date.localeCompare(a.date));
    const dTb=document.getElementById('dTb'),dTl=document.getElementById('dTimeline'),dEm=document.getElementById('dEmpty');
    if(!dSorted.length){dTb.innerHTML='';dTl.innerHTML='';dEm.style.display='block'}else{
        dEm.style.display='none';
        dTb.innerHTML=dSorted.map(r=>{const i=D.deworm.indexOf(r);return`<tr><td>${r.date}</td><td>${r.type||'-'}</td><td>${r.brand||'-'}</td><td>${r.nextDate||'-'}</td><td>${r.note||'-'}</td><td class="actions"><button class="btn btn-ghost btn-sm" onclick="openDewormForm(${i})">编辑</button><button class="btn btn-danger btn-sm" onclick="delRec('deworm',${i})">删除</button></td></tr>`}).join('');

    }
    // Alerts
    const todayStr=today();let aHtml='';
    D.vaccine.filter(r=>r.nextDate&&r.nextDate<todayStr).forEach(r=>{aHtml+=`<div class="reminder danger"><span class="r-dot"></span>${r.name} 已过期（应于 ${r.nextDate}）</div>`});
    D.deworm.filter(r=>r.nextDate&&r.nextDate<todayStr).forEach(r=>{aHtml+=`<div class="reminder danger"><span class="r-dot"></span>驱虫已过期（应于 ${r.nextDate}）</div>`});
    const nextV=D.vaccine.filter(r=>r.nextDate&&r.nextDate>=todayStr).sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
    const nextD=D.deworm.filter(r=>r.nextDate&&r.nextDate>=todayStr).sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
    if(nextV){const d=Math.ceil((new Date(nextV.nextDate)-new Date())/864e5);aHtml+=`<div class="reminder ${d<=7?'warn':'ok'}"><span class="r-dot"></span>${nextV.name}: ${nextV.nextDate}（${d}天后）</div>`}
    if(nextD){const d=Math.ceil((new Date(nextD.nextDate)-new Date())/864e5);aHtml+=`<div class="reminder ${d<=7?'warn':'ok'}"><span class="r-dot"></span>驱虫: ${nextD.nextDate}（${d}天后）</div>`}
    document.getElementById('imAlerts').innerHTML=aHtml;
}

function renderExpense(){
    const sorted=[...D.expense].sort((a,b)=>b.date.localeCompare(a.date));
    const tb=document.getElementById('eTb'),em=document.getElementById('eEmpty');
    // Stats
    const total=D.expense.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
    const mStr=today().slice(0,7);
    const mTotal=D.expense.filter(r=>r.date.startsWith(mStr)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
    document.getElementById('expStats').innerHTML=`
        <div class="stat-card orange"><div class="s-label">累计消费</div><div class="s-value">¥${total.toFixed(0)}</div></div>
        <div class="stat-card pink"><div class="s-label">本月消费</div><div class="s-value">¥${mTotal.toFixed(0)}</div></div>
    `;
    if(!sorted.length){tb.innerHTML='';em.style.display='block';return}
    em.style.display='none';
    tb.innerHTML=sorted.map(r=>{const i=D.expense.indexOf(r);return`<tr><td>${r.date}</td><td><span class="tag tag-${expColor(r.category)}">${r.category}</span></td><td>${r.item}</td><td style="font-weight:600">¥${r.amount}</td><td>${r.note||'-'}</td><td class="actions"><button class="btn btn-ghost btn-sm" onclick="openExpenseForm(${i})">编辑</button><button class="btn btn-danger btn-sm" onclick="delRec('expense',${i})">删除</button></td></tr>`}).join('');
}
function expColor(c){return{粮食:'orange',用品:'blue',医疗:'green',玩具:'purple',洗护:'pink'}[c]||'gray'}

function drawPie(){
    const c=document.getElementById('pieChart');if(!c)return;
    const ctx=c.getContext('2d');c.width=200;c.height=200;
    const mStr=today().slice(0,7);
    const mData=D.expense.filter(r=>r.date.startsWith(mStr));
    const catMap={};mData.forEach(r=>{catMap[r.category]=(catMap[r.category]||0)+(parseFloat(r.amount)||0)});
    const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
    const mTotal=cats.reduce((s,c)=>s+c[1],0);
    document.getElementById('pieTotal').textContent='¥'+mTotal.toFixed(0);
    const colors={'粮食':'#fb923c','用品':'#60a5fa','医疗':'#4ade80','玩具':'#a855f7','洗护':'#f472a8','其他':'#9ca3af'};
    const cx=100,cy=100,r=42;
    ctx.clearRect(0,0,200,200);
    if(!cats.length){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#e5e7eb';ctx.lineWidth=16;ctx.stroke();return}
    let start=-Math.PI/2;
    cats.forEach(([cat,val])=>{
        const angle=(val/mTotal)*Math.PI*2;
        ctx.beginPath();ctx.arc(cx,cy,r,start,start+angle);ctx.strokeStyle=colors[cat]||'#9ca3af';ctx.lineWidth=16;ctx.lineCap='butt';ctx.stroke();
        start+=angle;
    });
    // Legend
    document.getElementById('pieLegend').innerHTML=cats.map(([cat,val])=>`<div class="legend-item"><span class="l-dot" style="background:${colors[cat]||'#9ca3af'}"></span>${cat} ¥${val.toFixed(0)}</div>`).join('');
}

    em.style.display='none';
    const tc=t=>({疫苗:'green',驱虫:'blue',体检:'orange',手术:'red'}[t]||'gray');
    tb.innerHTML=sorted.map(r=>{const i=D.medical.indexOf(r);return`<tr><td>${r.date}</td><td><span class="tag tag-${tc(r.type)}">${r.type}</span></td><td>${r.diagnosis}</td><td>${r.hospital||'-'}</td><td>${r.cost?'¥'+r.cost:'-'}</td><td class="actions"><button class="btn btn-ghost btn-sm" onclick="openMedicalForm(${i})">编辑</button><button class="btn btn-danger btn-sm" onclick="delRec('medical',${i})">删除</button></td></tr>`}).join('');
}

function openMedicalForm(idx=-1){
    const e=idx>=0,r=e?D.medical[idx]:{date:today(),type:'',diagnosis:'',hospital:'',cost:'',note:''};
    setModal(`<h3>${e?'编辑':'添加'}就诊</h3>
    <div class="form-row"><div class="form-group"><label>日期</label><input type="date" id="fm-d" value="${r.date}"></div><div class="form-group"><label>类型</label><select id="fm-t"><option value="">选择</option>${['体检','就诊','手术','疫苗','驱虫','其他'].map(t=>`<option${r.type===t?' selected':''}>${t}</option>`).join('')}</select></div></div>
    <div class="form-group"><label>项目/诊断</label><input id="fm-dg" value="${r.diagnosis||''}"></div>
    <div class="form-row"><div class="form-group"><label>医院</label><input id="fm-h" value="${r.hospital||''}"></div><div class="form-group"><label>费用</label><input type="number" id="fm-c" value="${r.cost||''}"></div></div>
    <div class="form-group"><label>备注</label><textarea id="fm-n">${r.note||''}</textarea></div>
    <div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveMedical(${idx})">保存</button></div>`);
}
function saveMedical(idx){const r={date:gi('fm-d'),type:gi('fm-t'),diagnosis:gi('fm-dg'),hospital:gi('fm-h'),cost:gi('fm-c'),note:gi('fm-n')};if(!r.date||!r.type||!r.diagnosis){alert('请填写');return}if(idx>=0)D.medical[idx]=r;else D.medical.push(r);save();renderMedical();renderProfile();closeModal()}

// ==================== PHOTOS ====================
function renderPhotos(){
    const sorted=[...D.photos].sort((a,b)=>b.date.localeCompare(a.date));
    const g=document.getElementById('photoGrid');
    g.innerHTML=sorted.map((p,i)=>{const idx=D.photos.indexOf(p);return`<div class="photo-item" onclick="document.getElementById('lbImg').src='${p.src}';document.getElementById('lb').classList.add('show')"><img src="${p.src}" alt=""><div class="p-meta">${p.date}${p.note?' · '+p.note:''}</div><button class="p-del" onclick="event.stopPropagation();delRec('photos',${idx})">✕</button></div>`}).join('')+`<div class="photo-add" onclick="document.getElementById('phInput').click()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>上传</span></div>`;
}
function handlePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const n=prompt('备注：','')||'';D.photos.push({src:ev.target.result,date:today(),note:n});save();renderPhotos()};r.readAsDataURL(f);e.target.value=''}

// ==================== GENERIC DELETE ====================
function delRec(key,idx){if(!confirm('确认删除？'))return;D[key].splice(idx,1);save();renderAll()}

// ==================== RENDER ALL ====================
function renderAll(){renderProfile();renderWeight();renderFeeding();renderImmune();renderExpense();renderMedical();renderPhotos();renderCalendar()}
renderAll();

// Register SW
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
